<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details – EventHub</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand"><span class="logo-icon"><i data-lucide="crosshair"></i></span> EventHub</a>
            <div class="navbar-links" id="main-nav"></div>
        </div>
    </nav>

    <div class="container">
        <div id="event-loading" class="text-center">
            <div class="spinner"></div>
        </div>

        <div id="event-content" class="hidden">
            <div class="page-header">
                <h1 id="event-title"></h1>
                <p id="event-institute"></p>
            </div>

            <div class="section-panel">
                <div class="section-panel-body">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;">
                        <div>
                            <div id="event-image-container" class="card-image"
                                style="border-radius:var(--radius-md);margin-bottom:1.5rem;height:250px;"></div>
                            <p id="event-desc" style="color:var(--text-secondary);line-height:1.8;"></p>
                        </div>
                        <div>
                            <div class="dashboard-grid" style="grid-template-columns:1fr 1fr;">
                                <div class="stat-card">
                                    <div class="stat-icon"><i data-lucide="calendar" style="width:32px;height:32px;"></i></div>
                                    <div class="stat-value" id="event-date" style="font-size:1rem;"></div>
                                    <div class="stat-label">Date</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon"><i data-lucide="map-pin" style="width:32px;height:32px;"></i></div>
                                    <div class="stat-value" id="event-location" style="font-size:1rem;"></div>
                                    <div class="stat-label">Location</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon"><i data-lucide="tag" style="width:32px;height:32px;"></i></div>
                                    <div class="stat-value" id="event-fees" style="font-size:1rem;"></div>
                                    <div class="stat-label">Registration Fee</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon"><i data-lucide="gamepad-2" style="width:32px;height:32px;"></i></div>
                                    <div class="stat-value" id="event-rounds" style="font-size:1rem;"></div>
                                    <div class="stat-label">Total Rounds</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-icon"><i data-lucide="bar-chart-3" style="width:32px;height:32px;"></i></div>
                                    <div class="stat-value" id="event-status" style="font-size:1rem;"></div>
                                    <div class="stat-label">Status</div>
                                </div>
                            </div>

                            <div class="mt-3" id="action-area"></div>



                            <!-- Map Section -->
                            <div class="mt-3 hidden" id="map-section">
                                <h3 class="mb-2"><i data-lucide="map-pin" style="width:20px;height:20px;"></i> Venue Map</h3>
                                <div id="event-map" class="map-container"></div>
                            </div>

                            <!-- Extra Locations -->
                            <div class="mt-3 hidden" id="extra-locations-section">
                                <h3 class="mb-2"><i data-lucide="building" style="width:20px;height:20px;"></i> Additional Locations</h3>
                                <p id="extra-locations-text" style="color:var(--text-secondary);"></p>
                            </div>

                            <!-- Live Updates for PAID participants -->
                            <div class="mt-3 hidden" id="updates-section">
                                <h3 class="mb-2"><i data-lucide="megaphone" style="width:20px;height:20px;"></i> Live Updates</h3>
                                <div id="updates-list" class="notif-list"
                                    style="max-height:400px;border:1px solid var(--border-glass);border-radius:var(--radius-md);padding:10px;">
                                    <div class="text-center py-2 opacity-50">No updates yet.</div>
                                </div>
                            </div>

                            <!-- Hall of Fame -->
                            <div class="mt-3 hidden" id="hall-of-fame-section">
                                <h2 class="mb-3 text-center" style="font-size:2rem;"><i data-lucide="trophy" style="width:28px;height:28px;"></i> Hall of Fame</h2>
                                <div id="hall-of-fame-list"
                                    style="display:grid;grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));gap:1.5rem;">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="event-error" class="empty-state hidden">
            <div class="empty-icon"><i data-lucide="x-circle" style="width:64px;height:64px;"></i></div>
            <h3>Event Not Found</h3>
            <p><a href="index.html">Go back to events</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const eventId = params.get('id');

        let eventMap;
        let eventMarker;

        async function loadEventData() {
            if (!eventId) {
                document.getElementById('event-loading').classList.add('hidden');
                document.getElementById('event-error').classList.remove('hidden');
                return;
            }

            try {
                const data = await api.get(`/events/${eventId}`);
                const e = data.event;

                document.getElementById('event-loading').classList.add('hidden');
                document.getElementById('event-content').classList.remove('hidden');

                document.title = `${e.title} – EventHub`;
                document.getElementById('event-title').textContent = e.title;
                document.getElementById('event-institute').innerHTML = e.institute_name ? `${icon('building-2',16)} by ${e.institute_name}` : '';
                document.getElementById('event-desc').textContent = e.description || 'No description available.';

                const startStr = formatDateTime(e.date);
                const endStr = formatDateTime(e.end_date);
                document.getElementById('event-date').innerHTML = `<span style="display:block;font-size:0.85rem;opacity:0.7;">Started:</span> ${startStr}<br><span style="display:block;font-size:0.85rem;opacity:0.7;margin-top:4px;">Ends:</span> ${endStr}`;

                document.getElementById('event-location').textContent = e.location;
                document.getElementById('event-fees').textContent = e.fees === 0 ? 'Free' : `₹ ${e.fees}`;
                document.getElementById('event-rounds').textContent = `${e.num_rounds} Rounds`;
                document.getElementById('event-status').innerHTML = statusBadge(e.approval_status);

                // Show Map
                if (e.latitude && e.longitude) {
                    document.getElementById('map-section').classList.remove('hidden');
                    if (!eventMap) {
                        eventMap = L.map('event-map').setView([e.latitude, e.longitude], 15);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '&copy; OpenStreetMap contributors'
                        }).addTo(eventMap);
                    }
                    if (eventMarker) eventMarker.remove();
                    eventMarker = L.marker([e.latitude, e.longitude]).addTo(eventMap).bindPopup(`<b>${e.title}</b><br>${e.location}`).openPopup();
                    setTimeout(() => eventMap.invalidateSize(), 500);
                }

                // Extra Locations
                if (e.extra_locations) {
                    document.getElementById('extra-locations-section').classList.remove('hidden');
                    document.getElementById('extra-locations-text').textContent = e.extra_locations;
                }

                const imgContainer = document.getElementById('event-image-container');
                if (e.image_url) {
                    imgContainer.innerHTML = `<img src="${e.image_url}" alt="${e.title}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-md);">`;
                } else {
                    imgContainer.innerHTML = `<div class="placeholder-icon">${icon('ticket', 48)}</div>`;
                }

                // Action area
                const user = api.getUser();
                const actionArea = document.getElementById('action-area');

                if (!user) {
                    actionArea.innerHTML = `<a href="login.html" class="btn btn-primary btn-lg w-full">${icon('lock',16)} Login to Register</a>`;
                } else if (user.role === 'PARTICIPANT' && e.approval_status === 'APPROVED') {
                    if (e.is_registered) {
                        actionArea.innerHTML = `<button class="btn btn-success btn-lg w-full" disabled>${icon('check-circle',16)} Registered</button>`;
                    } else {
                        actionArea.innerHTML = `
                            <div id="registration-form-area" class="section-panel" style="margin-top:1rem; padding:1.5rem; border:1px solid var(--accent-blue); background:rgba(59, 130, 246, 0.05);">
                                <h3 class="mb-3 text-center">Registration</h3>
                                ${e.qr_code_url ? `
                                    <div style="margin-bottom: 1.5rem; text-align:center;">
                                        <p style="margin-bottom:0.8rem; font-weight:bold;">Scan QR code to pay ₹${e.fees}</p>
                                        <img src="${e.qr_code_url}" alt="Payment QR Code" style="max-width:200px; border-radius:8px; border: 2px solid var(--border-glass);">
                                    </div>
                                    <div class="form-group">
                                        <label for="receipt-image">Upload Payment Screenshot</label>
                                        <input type="file" id="receipt-image" accept="image/*">
                                        <small class="opacity-60">Required to confirm payment (after admin verifies)</small>
                                    </div>
                                ` : ''}
                                <button class="btn btn-primary btn-lg w-full" id="register-btn" onclick="registerForEvent()">${icon('crosshair',16)} ${e.qr_code_url ? 'Submit Payment & Register' : 'Register for Event'}</button>
                            </div>
                        `;
                    }
                } else if (user.role === 'PARTICIPANT') {
                    actionArea.innerHTML = `<div class="alert alert-info">⏳ This event is not yet approved.</div>`;
                } else {
                    actionArea.innerHTML = `<div class="alert alert-info">${icon('info',16)} Only participants can register for events.</div>`;
                }

                // Load updates and results if logged in as participant
                if (user && user.role === 'PARTICIPANT') {
                    loadUpdates();
                }

                // Load Hall of Fame (Public)
                loadHallOfFame();

            } catch (err) {
                document.getElementById('event-loading').classList.add('hidden');
                document.getElementById('event-error').classList.remove('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadEventData();
            // Start polling for updates every 10s if logged in
            if (api.isLoggedIn()) {
                setInterval(loadUpdates, 10001);
            }
        });

        async function registerForEvent() {
            if (!api.isLoggedIn()) { window.location.href = 'login.html'; return; }
            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = 'Registering…';

            try {
                const formData = new FormData();
                const receiptInput = document.getElementById('receipt-image');
                if (receiptInput && receiptInput.files && receiptInput.files.length > 0) {
                    formData.append('receipt_image', receiptInput.files[0]);
                }
                
                const res = await fetch(`/events/register/${eventId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${api.getToken()}`
                    },
                    body: formData
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.message || 'Registration failed');
                }
                
                showToast('Successfully registered!', 'success');
                // Refresh data to update spots count and button state immediately
                loadEventData();
            } catch (err) {
                showToast(err.message || 'Registration failed', 'error');
                btn.disabled = false;
                btn.innerHTML = `${icon('crosshair',16)} Register for Event`;
                refreshIcons();
            }
        }



        async function loadUpdates() {
            if (!api.isLoggedIn()) return;
            try {
                const data = await api.getEventUpdates(eventId);
                const updates = data.updates || [];

                document.getElementById('updates-section').classList.remove('hidden');
                const container = document.getElementById('updates-list');

                if (updates.length === 0) {
                    container.innerHTML = '<div class="text-center py-2 opacity-50">No updates yet.</div>';
                } else {
                    container.innerHTML = updates.map(u => `
                        <div class="notif-item" style="border-left:3px solid var(--accent-blue);">
                            <div class="notif-msg" style="color:var(--text-primary);">${u.message}</div>
                            <div class="notif-time">${formatDateTime(u.created_at)}</div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                // If 403, it means not PAID or not registered, so keep hidden
                if (err.status === 403) {
                    document.getElementById('updates-section').classList.add('hidden');
                }
            }
        }

        async function loadHallOfFame() {
            try {
                const data = await api.getEventResults(eventId);
                const results = data.results || [];
                if (results.length === 0) return;

                document.getElementById('hall-of-fame-section').classList.remove('hidden');
                document.getElementById('hall-of-fame-list').innerHTML = results.map(r => `
                    <div class="card" style="border:1px solid var(--accent-amber);background:rgba(245, 158, 11, 0.05);">
                        <div class="card-body text-center">
                            <div style="font-size:2.5rem;margin-bottom:0.5rem;">${r.rank === 1 ? icon('medal', 40, '#FFD700') : r.rank === 2 ? icon('medal', 40, '#C0C0C0') : r.rank === 3 ? icon('medal', 40, '#CD7F32') : icon('award', 40)}</div>
                            <h3 style="color:var(--accent-amber);">${r.prize_name}</h3>
                            <div style="font-weight:600;font-size:1.1rem;margin:0.5rem 0;">${r.user_name}</div>
                            <p style="font-size:0.9rem;opacity:0.8;">${r.prize_description || ''}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) { }
        }
    </script>
<script>document.addEventListener('DOMContentLoaded', () => { refreshIcons(); });</script>
</body>

</html>
