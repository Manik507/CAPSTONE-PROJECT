<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – EventHub</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand"><span class="logo-icon"><i data-lucide="crosshair"></i></span> EventHub</a>
            <div class="navbar-links" id="main-nav"></div>
        </div>
    </nav>

    <div class="form-container" style="margin-top: 3rem;">
        <div class="form-card">
            <h2>Participant Registration</h2>
            <p class="subtitle">Join EventHub to participate in events</p>

            <div id="reg-alert"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="username">Username (@handle)</label>
                    <input type="text" id="username" placeholder="alex_ninja" required>
                </div>
                <div class="form-group">
                    <label for="phone_number">Phone Number</label>
                    <input type="text" id="phone_number" placeholder="10 Digits" required pattern="[0-9]{10}" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')" title="Must be exactly 10 digits">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-container">
                        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)"><i data-lucide="eye" style="width:18px;height:18px;"></i></button>
                    </div>
                </div>
                <input type="hidden" id="role" value="PARTICIPANT">
                <button type="submit" class="btn btn-primary w-full btn-lg" id="reg-btn"><i data-lucide="rocket"></i> Register</button>
            </form>

            <div class="form-footer mt-2">
                Already have an account? <a href="login.html">Login</a><br><br>
                Are you an Institute? <a href="institute-register.html">Apply as Institute</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.textContent = 'Creating account…';

            try {
                const data = await api.post('/auth/register', {
                    full_name: document.getElementById('full_name').value.trim(),
                    username: document.getElementById('username').value.trim(),
                    phone_number: document.getElementById('phone_number').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value,
                    role: document.getElementById('role').value,
                });

                api.setAuth(data.access_token, data.user);
                showToast('Account created successfully!', 'success');

                const role = data.user.role;
                setTimeout(() => {
                    if (role === 'ADMIN') window.location.href = 'admin-dashboard.html';
                    else if (role === 'INSTITUTE') window.location.href = 'institute-dashboard.html';
                    else window.location.href = 'dashboard.html';
                }, 500);

            } catch (err) {
                document.getElementById('reg-alert').innerHTML =
                    `<div class="alert alert-error"><i data-lucide="x-circle" style="width:16px;height:16px;"></i> ${err.message || 'Registration failed'}</div>`;
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="rocket"></i> Register';
                refreshIcons();
            }
        });
    </script>
<script>document.addEventListener('DOMContentLoaded', () => { refreshIcons(); });</script>
</body>
</html>
