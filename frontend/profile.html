<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - EventHub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand"><span class="logo-icon">EventHub</span></a>
            <div class="navbar-links" id="main-nav"></div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>My Profile</h1>
            <p>Manage your account and view your legacy</p>
        </div>

        <div class="dashboard-grid" style="grid-template-columns: 1fr 1.5fr; gap: 2rem;">
            <div>
                <div class="card">
                    <div class="card-body">
                        <div style="text-align: center; margin-bottom: 1.5rem;">
                            <div style="font-size: 5rem;">Profile</div>
                            <h2 id="display-name">Loading...</h2>
                            <p id="display-username" class="opacity-70">@username</p>
                            <p id="display-email" class="opacity-60" style="font-size: 0.9rem; margin-top: 5px;">email@example.com</p>
                            <button type="button" class="btn btn-secondary btn-sm mt-2" id="edit-toggle-btn">Edit Profile</button>
                        </div>

                        <form id="profile-form">
                            <div class="form-group">
                                <label for="pf-full-name">Full Name</label>
                                <input type="text" id="pf-full-name" class="form-control" required disabled>
                            </div>
                            <div class="form-group">
                                <label for="pf-username">Username</label>
                                <input type="text" id="pf-username" class="form-control" required disabled>
                                <small class="opacity-60">Must be unique across EventHub</small>
                            </div>
                            <div class="form-group">
                                <label for="pf-email">Email Address</label>
                                <input type="email" id="pf-email" class="form-control" disabled>
                                <small class="opacity-60">Email cannot be changed</small>
                            </div>
                            <div class="form-group">
                                <label for="pf-phone">Phone Number</label>
                                <input type="text" id="pf-phone" class="form-control" required maxlength="10" disabled>
                                <small id="phone-hint" class="opacity-60">Must be 10 digits</small>
                            </div>
                            <button type="submit" class="btn btn-primary w-full hidden" id="save-btn">Save Changes</button>
                        </form>
                    </div>
                </div>
            </div>

            <div>
                <div class="dashboard-grid" id="stats-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                    <div class="stat-card clickable" onclick="showList('followers')">
                        <div class="stat-value" id="count-followers">0</div>
                        <div class="stat-label">Followers</div>
                    </div>
                    <div class="stat-card clickable" onclick="showList('following')">
                        <div class="stat-value" id="count-following">0</div>
                        <div class="stat-label">Following</div>
                    </div>
                    <div class="stat-card role-participant-only">
                        <div class="stat-value" id="stat-xp">0</div>
                        <div class="stat-label">Total XP</div>
                    </div>
                    <div class="stat-card role-participant-only">
                        <div class="stat-value" id="stat-trophies">0</div>
                        <div class="stat-label">Trophies</div>
                    </div>
                </div>

                <div class="section-panel">
                    <div class="section-panel-header">
                        <h2 id="history-title">Competition History</h2>
                    </div>
                    <div class="section-panel-body">
                        <div id="history-list" class="notif-list">
                            <div class="text-center py-2 opacity-50">Fetching your legacy...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="list-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2 id="modal-title">Users</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-list" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="details-modal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 700px; text-align: left;">
            <div class="section-panel-header">
                <h2 id="details-title">Details</h2>
                <button class="btn-close" onclick="closeDetailsModal()">&times;</button>
            </div>
            <div class="section-panel-body" id="details-body" style="padding: 1.5rem;"></div>
            <div class="modal-footer" style="padding: 1rem 1.5rem; text-align: right; border-top: 1px solid var(--border-glass);">
                <button class="btn btn-secondary" onclick="closeDetailsModal()">Close</button>
            </div>
        </div>
    </div>

    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 2rem;
        }
        .modal-content {
            max-height: 90vh;
            overflow-y: auto;
            width: 100%;
        }
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .details-label {
            font-weight: 600;
            opacity: 0.6;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .details-value {
            font-weight: 500;
            font-size: 0.95rem;
        }
    </style>

    <script src="js/api.js"></script>
    <script>
        if (!requireAuth()) { /* redirected */ }

        async function loadProfile(silent = false) {
            try {
                const data = await api.get('/auth/me');
                const u = data.user;

                document.getElementById('display-name').textContent = u.full_name || 'N/A';
                document.getElementById('display-username').textContent = `@${u.username || 'unknown'}`;

                const profileData = await api.getUserProfile(u.id);
                const p = profileData.profile || {};

                document.getElementById('display-email').textContent = p.email || u.email || 'N/A';

                const isEditing = !document.getElementById('pf-full-name').disabled;
                if (!isEditing) {
                    document.getElementById('pf-full-name').value = u.full_name || '';
                    document.getElementById('pf-username').value = u.username || '';
                    document.getElementById('pf-email').value = u.email || '';
                    document.getElementById('pf-phone').value = u.phone_number || '';
                }

                document.getElementById('count-followers').textContent = p.follower_count || 0;
                document.getElementById('count-following').textContent = p.following_count || 0;

                const isParticipant = u.role === 'PARTICIPANT';
                const isInstitute = u.role === 'INSTITUTE';

                document.querySelectorAll('.role-participant-only').forEach((el) => {
                    el.style.display = isParticipant ? 'block' : 'none';
                });

                if (isParticipant) {
                    document.getElementById('stat-xp').textContent = p.xp || 0;
                    document.getElementById('stat-trophies').textContent = p.trophies || 0;
                }

                const historyTitle = document.getElementById('history-title');
                if (u.role === 'INSTITUTE') {
                    historyTitle.textContent = 'Created Events';
                } else if (u.role === 'ADMIN') {
                    historyTitle.textContent = 'Platform Activity Logs';
                } else if (u.role === 'VOLUNTEER') {
                    historyTitle.textContent = 'Volunteer Activity';
                } else {
                    historyTitle.textContent = 'Competition History';
                }

                const historyContainer = document.getElementById('history-list');
                const history = p.competition_history || [];
                if (history.length === 0) {
                    let msg = 'No data available';
                    if (u.role === 'INSTITUTE') msg = 'No events created yet';
                    if (u.role === 'ADMIN') msg = 'No activity logs recorded yet';
                    if (u.role === 'PARTICIPANT') msg = 'Start participating to build your history';
                    if (u.role === 'VOLUNTEER') msg = 'No volunteer activity recorded yet';
                    historyContainer.innerHTML = `<div class="text-center py-4"><div class="opacity-70">${msg}</div></div>`;
                } else {
                    historyContainer.innerHTML = history.map((h) => `
                        <div class="notif-item">
                            <div class="notif-title" style="color:var(--text-primary); font-weight:600;">
                                ${h.event_title || 'Untitled'}
                            </div>
                            <div class="notif-msg" style="margin: 0.25rem 0;">
                                ${h.institute_description ? `<div style="font-size:0.8rem; opacity:0.7; margin-bottom: 5px;">${h.institute_description}</div>` : ''}
                                ${isParticipant ? `
                                    <span class="badge badge-approved">+${h.rewards?.xp || 0} XP</span>
                                    <span class="badge badge-approved" style="background:var(--accent-amber)">+${h.rewards?.trophies || 0} Trophy</span>
                                ` : (u.role === 'ADMIN' ? `
                                    <div style="display: flex; justify-content: space-between; align-items: center;">
                                        <span class="badge badge-pending">Decision by ${h.admin_name || 'Admin'}</span>
                                        <button
                                            class="btn btn-sm btn-secondary view-details-btn"
                                            data-target-type="${h.target_type || ''}"
                                            data-target-id="${h.target_id || ''}"
                                            data-admin-decision="${escapeHtml(h.institute_description || '')}">
                                            View Target Details
                                        </button>
                                    </div>
                                ` : '')}
                            </div>
                            <div class="notif-time">${formatDate(h.event_date)}</div>
                        </div>
                    `).join('');

                    document.querySelectorAll('.view-details-btn').forEach((btn) => {
                        btn.addEventListener('click', (e) => {
                            const type = e.currentTarget.dataset.targetType;
                            const id = parseInt(e.currentTarget.dataset.targetId, 10);
                            const decisionEncoded = e.currentTarget.dataset.adminDecision || '';
                            const decision = decisionEncoded
                                .replace(/&#10;/g, '\n')
                                .replace(/&#13;/g, '\r')
                                .replace(/&quot;/g, '"')
                                .replace(/&amp;/g, '&')
                                .replace(/&lt;/g, '<')
                                .replace(/&gt;/g, '>')
                                .replace(/&#039;/g, "'");
                            if (type && id) {
                                viewTargetDetails(type, id, decision);
                            }
                        });
                    });
                }

                if (!isInstitute && u.role !== 'PARTICIPANT') {
                    document.getElementById('display-email').textContent = p.email || u.email || 'N/A';
                }
            } catch (err) {
                console.error('Profile load error:', err);
                if (!silent) showToast(err.message || 'Failed to load profile', 'error');
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            const originalText = btn.textContent;

            const fullName = document.getElementById('pf-full-name').value.trim();
            const username = document.getElementById('pf-username').value.trim();
            const phone = document.getElementById('pf-phone').value.trim();

            if (phone && (phone.length !== 10 || !/^\d+$/.test(phone))) {
                showToast('Please enter a valid 10-digit phone number', 'error');
                return;
            }

            try {
                btn.textContent = 'Saving...';
                btn.disabled = true;

                await api.patch('/auth/update', {
                    full_name: fullName,
                    username,
                    phone_number: phone
                });

                showToast('Profile updated successfully!', 'success');
                toggleEditMode(false);
                await loadProfile();

                const currentUser = api.getUser();
                if (currentUser) {
                    currentUser.full_name = fullName;
                    currentUser.username = username;
                    currentUser.phone_number = phone;
                    api.setAuth(api.getToken(), currentUser);
                    buildNav();
                }
            } catch (err) {
                showToast(err.message || 'Update failed', 'error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        async function showList(type) {
            document.getElementById('modal-title').textContent = type === 'followers' ? 'Followers' : 'Following';
            document.getElementById('modal-list').innerHTML = '<div class="text-center py-2"><div class="spinner"></div></div>';
            document.getElementById('list-modal').classList.remove('hidden');
            startListPolling(type);
        }

        let listPollInterval = null;

        async function startListPolling(type) {
            if (listPollInterval) clearInterval(listPollInterval);

            const fetchAndRender = async () => {
                const user = api.getUser();
                if (!user) return;

                try {
                    const data = await api.get(`/social/${type}/${user.id}`);
                    const items = data[type] || [];
                    const list = document.getElementById('modal-list');

                    if (items.length === 0) {
                        list.innerHTML = `<div class="text-center py-4"><div style="font-weight:600;">No ${type} yet</div></div>`;
                        return;
                    }

                    list.innerHTML = items.map((u) => `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <div>
                                <div style="font-weight: 600;">${u.full_name}</div>
                                <div class="opacity-70" style="font-size: 0.85rem;">@${u.username}</div>
                            </div>
                            <a href="index.html?search=${u.username}" class="btn btn-secondary btn-sm">View Profile</a>
                        </div>
                    `).join('');
                } catch (err) {
                    console.error('List refresh failed', err);
                }
            };

            await fetchAndRender();
            listPollInterval = setInterval(fetchAndRender, 5000);
        }

        let editMode = false;
        const editToggleBtn = document.getElementById('edit-toggle-btn');
        const saveBtn = document.getElementById('save-btn');
        const inputs = ['pf-full-name', 'pf-username', 'pf-phone'];

        function toggleEditMode(force) {
            editMode = force !== undefined ? force : !editMode;
            editToggleBtn.textContent = editMode ? 'Cancel' : 'Edit Profile';
            editToggleBtn.className = `btn btn-${editMode ? 'danger' : 'secondary'} btn-sm mt-2`;
            saveBtn.classList.toggle('hidden', !editMode);

            inputs.forEach((id) => {
                document.getElementById(id).disabled = !editMode;
            });
        }

        editToggleBtn.addEventListener('click', () => toggleEditMode());

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
                .replace(/\n/g, '&#10;')
                .replace(/\r/g, '&#13;');
        }

        function closeModal() {
            document.getElementById('list-modal').classList.add('hidden');
            if (listPollInterval) {
                clearInterval(listPollInterval);
                listPollInterval = null;
            }
            loadProfile(true);
        }

        async function viewTargetDetails(type, id, adminDecision = null) {
            try {
                const endpoint = type === 'INSTITUTE' ? `/institutes/${id}` : `/events/${id}`;
                const res = await api.get(endpoint);
                const data = type === 'INSTITUTE' ? res.institute : res.event;

                if (!data) {
                    showToast('No data found for this item', 'error');
                    return;
                }

                showDetails(type.toLowerCase(), id, data, adminDecision);
            } catch (err) {
                console.error('Error loading target details:', err);
                showToast('Target entity might have been deleted or not found.', 'error');
            }
        }

        function showDetails(type, id, data, adminDecision = null) {
            const modal = document.getElementById('details-modal');
            const title = document.getElementById('details-title');
            const body = document.getElementById('details-body');
            if (!modal || !title || !body) return;

            const val = (v) => (v === null || v === undefined || v === '' || v === 'null') ? '-' : v;

            if (type === 'institute') {
                title.innerHTML = `Institute: ${val(data.name)}`;
                body.innerHTML = `
                    ${adminDecision ? `
                        <div style="margin-bottom: 1.5rem;">
                            <div class="details-label" style="margin-bottom: 0.5rem;">Admin Decision</div>
                            <div class="card" style="padding: 1rem; background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent-blue); white-space: pre-wrap;">
                                ${val(adminDecision)}
                            </div>
                        </div>
                    ` : ''}
                    <div class="details-grid">
                        <div class="details-label">ID</div><div class="details-value">#${val(data.id)}</div>
                        <div class="details-label">Name</div><div class="details-value">${val(data.name)}</div>
                        <div class="details-label">Email</div><div class="details-value">${val(data.email)}</div>
                        <div class="details-label">Status</div><div class="details-value">${statusBadge(data.approval_status)}</div>
                        <div class="details-label">Applied</div><div class="details-value">${formatDate(data.created_at)}</div>
                    </div>
                    <div style="margin-top: 1.5rem;">
                        <div class="details-label" style="margin-bottom: 0.5rem;">Full Details / About</div>
                        <div class="card" style="padding: 1.5rem; background: var(--bg-glass); white-space: pre-wrap;">
                            ${val(data.details)}
                        </div>
                    </div>
                `;
            } else if (type === 'event') {
                title.innerHTML = `Event: ${val(data.title)}`;
                body.innerHTML = `
                    ${adminDecision ? `
                        <div style="margin-bottom: 1.5rem;">
                            <div class="details-label" style="margin-bottom: 0.5rem;">Admin Decision</div>
                            <div class="card" style="padding: 1rem; background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent-blue); white-space: pre-wrap;">
                                ${val(adminDecision)}
                            </div>
                        </div>
                    ` : ''}
                    ${data.image_url ? `<img src="${data.image_url}" style="width: 100%; border-radius: var(--radius-md); max-height: 300px; object-fit: contain; background: #000; border: 1px solid var(--border-glass); margin-bottom: 1.5rem;">` : ''}
                    <div class="details-grid">
                        <div class="details-label">ID</div><div class="details-value">#${val(data.id)}</div>
                        <div class="details-label">Title</div><div class="details-value"><strong>${val(data.title)}</strong></div>
                        <div class="details-label">Institute</div><div class="details-value">${val(data.institute_name)}</div>
                        <div class="details-label">Start Date</div><div class="details-value">${formatDate(data.date)}</div>
                        <div class="details-label">End Date</div><div class="details-value">${formatDate(data.end_date)}</div>
                        <div class="details-label">Location</div><div class="details-value">${val(data.location)}</div>
                        <div class="details-label">Extra Locs.</div><div class="details-value">${val(data.extra_locations)}</div>
                        <div class="details-label">Rounds</div><div class="details-value">${val(data.num_rounds)}</div>
                        <div class="details-label">Status</div><div class="details-value">${statusBadge(data.approval_status)}</div>
                    </div>
                    <div style="margin-top: 1.5rem;">
                        <div class="details-label" style="margin-bottom: 0.5rem;">Event Description</div>
                        <div class="card" style="padding: 1.5rem; background: var(--bg-glass); font-size: 0.95rem; white-space: pre-wrap;">
                            ${val(data.description)}
                        </div>
                    </div>
                `;
            }

            modal.classList.remove('hidden');
        }

        function closeDetailsModal() {
            document.getElementById('details-modal').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            setInterval(() => loadProfile(true), 5000);
        });
    </script>
</body>
</html>
